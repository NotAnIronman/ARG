<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Case File: Who Did It?</title>

<style>
body {
    background: #0d0f12;
    color: #d9e1e8;
    font-family: "Courier New", monospace;
}

.container {
    max-width: 900px;
    margin: 40px auto;
    background: #11161c;
    padding: 20px;
    border: 2px solid #2b3a48;
}

h1 {
    color: #c40000;
    text-transform: uppercase;
}

.suspect {
    border: 1px solid #2b3a48;
    padding: 12px;
    margin-bottom: 10px;
    cursor: pointer;
}

.suspect:hover {
    background: #18222c;
}

.selected {
    border: 2px solid #c40000;
    background: #1a0f10;
}

.vote-count {
    font-size: 12px;
    color: #888;
}
</style>
</head>

<body>

<div class="container">
    <h1>Case File: Active Investigation</h1>
    <p>Select the individual you believe is responsible.</p>

    <div id="suspects"></div>
</div>

<script>
const suspects = [
    "Gustau",
    "Nathan Bartholemew",
    "Ricardo Saintiagoon",
    "Patrick O'mallaghathy",
    "Usain Holt",
    "T Wing",
    "Freedough",
    "Unknown Entity"
];

const votesURL = "https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/main/data/votes.json";

let userVote = localStorage.getItem("userVote");

async function loadVotes() {
    const res = await fetch(votesURL + "?t=" + Date.now()); // cache bust
    return await res.json();
}

function saveLocal(votes) {
    localStorage.setItem("localVotes", JSON.stringify(votes));
}

function getLocalVotes() {
    return JSON.parse(localStorage.getItem("localVotes"));
}

async function vote(name) {
    let votes = await loadVotes();

    // remove previous vote
    if (userVote) {
        votes[userVote] = Math.max(0, votes[userVote] - 1);
    }

    votes[name] = (votes[name] || 0) + 1;

    userVote = name;
    localStorage.setItem("userVote", userVote);

    // NOTE: no server write yet
    saveLocal(votes);

    render(votes);
}

function render(votes) {
    const container = document.getElementById("suspects");
    container.innerHTML = "";

    suspects.forEach(name => {
        const div = document.createElement("div");
        div.className = "suspect";

        if (userVote === name) div.classList.add("selected");

        div.innerHTML = `
            <strong>${name}</strong>
            <div class="vote-count">Votes: ${votes[name] ?? 0}</div>
        `;

        div.onclick = () => vote(name);

        container.appendChild(div);
    });
}

// init
loadVotes().then(render);
</script>

</body>
</html>
