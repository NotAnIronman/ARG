<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Case File: Who Did It?</title>

<style>
body {
    background: #0d0f12;
    color: #d9e1e8;
    font-family: "Courier New", monospace;
}

.container {
    max-width: 900px;
    margin: 40px auto;
    background: #11161c;
    padding: 20px;
    border: 2px solid #2b3a48;
}

h1 {
    color: #c40000;
    text-transform: uppercase;
}

.suspect {
    border: 1px solid #2b3a48;
    padding: 12px;
    margin-bottom: 10px;
    cursor: pointer;
}

.suspect:hover {
    background: #18222c;
}

.selected {
    border: 2px solid #c40000;
    background: #1a0f10;
}

.vote-count {
    font-size: 12px;
    color: #888;
}
</style>
</head>

<body>

<div class="container">
    <h1>Case File: Active Investigation</h1>
    <p>Select the individual you believe is responsible.</p>

    <div id="suspects"></div>
</div>

<script>
const owner = "NotAnIronman";
const repo = "ARG";

const suspects = [
    "Gustau",
    "Nathan Bartholemew",
    "Ricardo Saintiagoon",
    "Patrick O'mallaghathy",
    "Usain Holt",
    "T Wing",
    "Freedough",
    "Unknown Entity"
];

let userVote = localStorage.getItem("userVote");

async function loadVotes() {
    const res = await fetch(
        `https://raw.githubusercontent.com/${owner}/${repo}/main/data/votes.json?t=${Date.now()}`
    );
    return await res.json();
}

async function sendVote(choice) {
    await fetch(`https://api.github.com/repos/${owner}/${repo}/dispatches`, {
        method: "POST",
        headers: {
            "Accept": "application/vnd.github+json",
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            event_type: "cast_vote",
            client_payload: {
                choice
            }
        })
    });
}

async function vote(name) {
    if (userVote) return; // 1 vote per device

    userVote = name;
    localStorage.setItem("userVote", name);

    await sendVote(name);

    alert("Vote recorded in case file.");
}

function render(votes) {
    const container = document.getElementById("suspects");
    container.innerHTML = "";

    suspects.forEach(name => {
        const div = document.createElement("div");
        div.className = "suspect";

        if (userVote === name) div.classList.add("selected");

        div.innerHTML = `
            <strong>${name}</strong>
            <div class="vote-count">Votes: ${votes[name] || 0}</div>
        `;

        div.onclick = () => vote(name);

        container.appendChild(div);
    });
}

loadVotes().then(render);
</script>
</body>
</html>
