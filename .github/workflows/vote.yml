name: Process Vote

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: read

jobs:
  update-votes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update votes
        run: |
          node -e "
          const fs = require('fs');

          const file = 'data/votes.json';
          const data = JSON.parse(fs.readFileSync(file));

          const issue = JSON.parse(process.env.ISSUE_BODY);

          const userId = issue.userId;
          const choice = issue.choice;

          if (!data.votes) data.votes = {};
          if (!data.votesByUser) data.votesByUser = {};

          const previous = data.votesByUser[userId];

          if (previous) {
              data.votes[previous] = Math.max(0, (data.votes[previous] || 0) - 1);
          }

          data.votesByUser[userId] = choice;
          data.votes[choice] = (data.votes[choice] || 0) + 1;

          fs.writeFileSync(file, JSON.stringify(data, null, 2));
          "
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}

      - name: Commit changes
        run: |
          git config user.name "vote-bot"
          git config user.email "actions@github.com"
          git add data/votes.json
          git commit -m "Update vote from issue"
          git push
